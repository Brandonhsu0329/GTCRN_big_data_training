network_config:
  n_fft: 512
  hop_len: 256
  win_len: 512

DDP:
  world_size: 1  # 單卡訓練，如需多卡可改為 2, 4 等

optimizer:
  lr: 0.001

scheduler:
  kwargs:
    warmup_steps: 2000    # 降低 warmup steps（數據量較小）
    decay_until_step: 50000
    max_lr: 1e-3
    min_lr: 1e-6

  update_interval: step  # [step, epoch]
  use_plateau: False

FFT:
  n_fft: 512
  hop_length: 256
  win_length: 512

loss:
  n_fft: ${FFT.n_fft}
  hop_len: ${FFT.hop_length}
  win_len: ${FFT.win_length}
  compress_factor: 0.3
  eps: 1e-12
  lamda_ri: 30
  lamda_mag: 70

train_dataset: 
  length_in_seconds: 2    # 改為 2 秒
  num_data_tot: 1152      # 訓練集總數（排除boy3/girl3）
  num_data_per_epoch: 1000  # 每個 epoch 使用的樣本數
  random_start_point: False  # 不使用隨機起始點（已經是固定長度）
  train: True

train_dataloader: 
  batch_size: 16          # 增加 batch size（音訊變短了）
  num_workers: 4
  drop_last: True
  pin_memory: True

validation_dataset: 
  length_in_seconds: 2    # 改為 2 秒
  num_data_tot: 128       # 驗證集總數（排除boy3/girl3）
  num_data_per_epoch: 128
  random_start_point: False
  train: False

validation_dataloader:
  batch_size: 16          # 增加 batch size
  num_workers: 4
  pin_memory: True

samplerate: 16000

trainer:
  epochs: 256             # 完整訓練 256 個 epochs
  save_checkpoint_interval: 10  # 每 10 個 epoch 存一次
  clip_grad_norm_value: 3.0
  exp_path: experiments/gtcrn_custom  # 實驗輸出路徑
  resume: False
  resume_datetime: 2024-12-31-14h28m
